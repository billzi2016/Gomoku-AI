# MkDocs documentation site for GOMOKU AI.
#
# The source lives under docs-site/docs. English and Chinese pages are kept in
# separate folders so maintainers can review each language without guessing
# which suffix belongs to which page.
site_name: GOMOKU AI Docs
site_url: https://billzi2016.github.io/Gomoku-AI/docs/
repo_url: https://github.com/billzi2016/Gomoku-AI
repo_name: billzi2016/Gomoku-AI

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.top
    - navigation.sections
    - navigation.expand
    - toc.follow
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - pymdownx.superfences

nav:
  - GitHub: https://github.com/billzi2016/Gomoku-AI
  - English:
      - Home: en/index.md
      - Project README: en/README.md
      - Specification: en/spec.md
      - JavaScript layer: en/js/README.md
      - Rust engine: en/rust/README.md
      - Wasm bindings: en/wasm/README.md
      - Process documents:
          - MkDocs PRD: en/prd/mkdocs_prd.md
          - GitHub Actions PRD: en/prd/github_action_prd.md
  - 中文:
      - 首页: zh/index.zh.md
      - 项目 README: zh/README.zh.md
      - 规格说明: zh/spec.zh.md
      - JavaScript 层: zh/js/README.zh.md
      - Rust 引擎: zh/rust/README.zh.md
      - Wasm 绑定: zh/wasm/README.zh.md
      - 过程文档:
          - MkDocs PRD: zh/prd/mkdocs_prd.zh.md
          - GitHub Actions PRD: zh/prd/github_action_prd.zh.md
