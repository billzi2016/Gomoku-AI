# GitHub Pages 自动部署流程。
#
# 每次推送 main 时重新编译 Rust/Wasm，准备静态文件 artifact，
# 然后部署到 GitHub Pages。不要直接上传 rust-ai/target 等构建缓存。
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        # wasm-bindgen 负责把 cargo 产出的 .wasm 包装成浏览器 ES module。
        run: cargo install wasm-bindgen-cli --locked

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: python -m pip install -r docs-site/requirements.txt

      - name: Build Wasm
        # 构建发布版 Wasm，并输出到前端固定加载目录 assets/wasm。
        working-directory: rust-ai
        run: |
          cargo build --target wasm32-unknown-unknown --release
          wasm-bindgen --target web --out-dir ../assets/wasm --out-name gomoku_ai target/wasm32-unknown-unknown/release/gomoku_ai.wasm

      - name: Build documentation site
        run: mkdocs build -f docs-site/mkdocs.yml --strict

      - name: Prepare artifact
        # Pages artifact 只需要静态站点文件，排除 Git 元数据和 Rust 构建缓存。
        run: |
          mkdir public
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='docs-site' \
            --exclude='rust-ai/target' \
            --exclude='target' \
            --exclude='__pycache__' \
            ./ public/
          mkdir -p public/docs
          rsync -a docs-site/site/ public/docs/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
