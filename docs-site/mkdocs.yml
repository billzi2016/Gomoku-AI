# MkDocs documentation site for GOMOKU AI.
#
# The source lives under docs-site/docs. English and Chinese pages are kept in
# separate folders so maintainers can review each language without guessing
# which suffix belongs to which page.
site_name: GOMOKU AI Docs
site_url: https://billzi2016.github.io/Gomoku-AI/docs/
repo_url: https://github.com/billzi2016/Gomoku-AI
repo_name: billzi2016/Gomoku-AI

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.top
    - navigation.sections
    - navigation.expand
    - toc.follow
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav:
            - GitHub: https://github.com/billzi2016/Gomoku-AI
            - 首页: index.md
            - 项目 README: project/README.zh.md
            - 玩法说明: rules.md
            - 规格说明: spec.zh.md
            - 算法说明: algorithm.zh.md
            - JavaScript 层: js/README.zh.md
            - Rust 引擎: rust/README.zh.md
            - Wasm 绑定: wasm/README.zh.md
            - 过程文档:
                - MkDocs PRD: prd/mkdocs_prd.zh.md
                - GitHub Actions PRD: prd/github_action_prd.zh.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - pymdownx.superfences

nav:
  - GitHub: https://github.com/billzi2016/Gomoku-AI
  - Home: index.md
  - Project README: project/README.md
  - How To Play: rules.md
  - Specification: spec.md
  - Algorithm: algorithm.md
  - JavaScript layer: js/README.md
  - Rust engine: rust/README.md
  - Wasm bindings: wasm/README.md
  - Process documents:
      - MkDocs PRD: prd/mkdocs_prd.md
      - GitHub Actions PRD: prd/github_action_prd.md
